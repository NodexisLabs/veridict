name: CI
on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.9', '3.12']
        include:
          - os: ubuntu-latest
            python: '3.8'          # honor the requires-python >=3.8 floor
    env:
      PYTHONIOENCODING: utf-8       # unicode box-drawing in the report/terminal output
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (stdlib-only, no deps)
        run: pip install -e .
      - name: Test suite (42 assertions vs real git/http/ports)
        run: python tests/test_veridict.py
      - name: Demo behaves (it must REJECT — the demo plants lies to catch)
        run: python -c "from veridict.demo import demo; from veridict import REJECT; import sys; sys.exit(0 if demo() == REJECT else 1)"
